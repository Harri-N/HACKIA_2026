# HackIA 2026 — configuration des modèles
# Modifier ce fichier pour changer de modèle ou de seuil sans toucher à app.py.

# ─── Phase 1 : classification du feu ───
fire:
  # Classifier actif. Valeurs possibles :
  #   efficientnet_b0, efficientnet_v2_s, efficientnet_v2_m, swin_b, resnet50
  classifier: efficientnet_b0
  # Fichier de poids (.pt) pour chaque architecture, relatif à ./models/.
  weights:
    efficientnet_b0:   efficientnet_b0_v2_Pauline.pt
    efficientnet_v2_s: phase1_fire_effnet_v2_s.pt
    efficientnet_v2_m: phase1_fire_effnet_v2_m.pt
    swin_b:            phase1_fire_swin_b.pt
    resnet50:          phase1_fire_resnet50zfzf.pt
  classes: [no_fire, start_fire, fire]
  image_size: 224
  normalization:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

# ─── Phase 1 : localisation YOLO (firezone) ───
firezone:
  weights: phase1_firezone.pt
  confidence: 0.3
  class_names:
    0: smoke
    1: fire

# ─── Phase 2 : détection d'objets (YOLO) ───
# Le modèle est supposé fine-tuné sur les classes voulues : on affiche toutes
# ses détections, sans filtrage côté application.
object_detection:
  weights: yolov8s.pt
  confidence: 0.25
  # Traduction des noms de classes (tels que renvoyés par model.names) vers le
  # français pour l'affichage. Toute classe absente de cette map est affichée
  # telle quelle.
  french_names:
    keys:       clés
    wallet:     portefeuille
    watch:      montre
    remote:     télécommande
    smartphone: téléphone
    
